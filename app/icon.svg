  <line x1="16" y1="12" x2="16" y2="5"  stroke="#00C8FF" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <line x1="19.5" y1="13.5" x2="25" y2="9"  stroke="#00C8FF" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <line x1="19.5" y1="18.5" x2="25" y2="23" stroke="#00C8FF" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <line x1="16" y1="20" x2="16" y2="27" stroke="#00C8FF" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <line x1="12.5" y1="18.5" x2="7"  y2="23" stroke="#00C8FF" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
  <line x1="12.5" y1="13.5" x2="7"  y2="9"  stroke="#00C8FF" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>

